name: Verify Workspace

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Corepack
        run: corepack enable

      - name: Install Dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Verify Environment Scaffolding
        run: corepack pnpm verify:env

      - name: Verify Web Surface
        run: corepack pnpm web:verify

      - name: Verify API Backend
        run: corepack pnpm --filter @bertinis-vault/api test

      - name: Verify Domain Rules
        run: corepack pnpm --filter @bertinis-vault/domain test

      - name: Verify Foundry Baseline
        run: corepack pnpm foundry:verify
