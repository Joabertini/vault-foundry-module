name: Release Module

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Corepack
        run: corepack enable

      - name: Install Dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run MVP Verification Gate
        run: corepack pnpm mvp:verify

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update release manifests
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.get_version.outputs.VERSION }}"/' module.json
          sed -i '0,/"version": ".*"/s//"version": "${{ steps.get_version.outputs.VERSION }}"/' package.json

      - name: Create release ZIP
        run: |
          zip -r bertinis-vault.zip . \
          --exclude "*.git*" \
          --exclude "*/.github/*" \
          --exclude "*/node_modules/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./bertinis-vault.zip
          body_path: CHANGELOG.md
          generate_release_notes: false
          draft: false
          prerelease: false
